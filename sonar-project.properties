sonarQubeUrl: https://sonarcloud.io
sonarQubeProjectKey: spitchy_TP_Projet_Microservice

# Project settings
projectSettings:
  projectName: TP Projet Microservice
  projectDescription: Library Management Microservice with Node.js, Express, PostgreSQL
  
# Quality gate settings
qualityGate:
  name: default
  conditions:
    - metric: sqale_rating
      operator: '>'
      error: 1 # A rating or worse
    - metric: coverage
      operator: '<'
      error: 60 # Less than 60% coverage
    - metric: security_rating
      operator: '>'
      error: 1 # A rating or worse

# Code coverage
coverage:
  exclusions:
    - '**/node_modules/**'
    - '**/__tests__/**'
    - '**/coverage/**'
    - '**/*.test.js'
    - '**/*.spec.js'

# Exclusions
exclusions:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/*.test.js'
  - '**/*.spec.js'
  - '**/coverage/**'
