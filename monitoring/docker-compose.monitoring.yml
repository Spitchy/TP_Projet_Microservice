# Docker Compose - Monitoring Stack
# Phase 6 - Prometheus + Grafana + Node Exporter
#
# Usage:
#   Start monitoring stack: docker-compose -f docker-compose.monitoring.yml up -d
#   Stop monitoring stack:  docker-compose -f docker-compose.monitoring.yml down
#
# Access:
#   Prometheus: http://localhost:${PROMETHEUS_HOST_PORT} (default: 9091)
#   Grafana:    http://localhost:${GRAFANA_HOST_PORT} (default: 3002, admin/admin)
#   App API:    http://localhost:${APP_HOST_PORT} (default: 3001)
#
# NOTE: Run with --env-file to load ports from parent .env:
#   docker-compose -f docker-compose.monitoring.yml --env-file ../.env up -d

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: library_postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libraryuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarypassword}
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-libraryuser} -d ${POSTGRES_DB:-library_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring-network

  # ==========================================================================
  # Library API Application
  # ==========================================================================
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: library_app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      POSTGRES_USER: ${POSTGRES_USER:-libraryuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarypassword}
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
    ports:
      - "${APP_HOST_PORT:-3001}:${PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - monitoring-network
    labels:
      - "prometheus-job=library-api"

  # ==========================================================================
  # Prometheus - Metrics Collection
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: library_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "${PROMETHEUS_HOST_PORT:-9091}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring-network
    restart: unless-stopped

  # ==========================================================================
  # Grafana - Visualization & Dashboards
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: library_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:${GRAFANA_HOST_PORT:-3002}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    ports:
      - "${GRAFANA_HOST_PORT:-3002}:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring-network
    restart: unless-stopped

  # ==========================================================================
  # Node Exporter - System Metrics (Linux only - disabled on Windows)
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: library_node_exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "${NODE_EXPORTER_HOST_PORT:-9101}:9100"
    networks:
      - monitoring-network
    restart: unless-stopped
    profiles:
      - linux

  # ==========================================================================
  # Alertmanager - Alert Routing (optional)
  # ==========================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: library_alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring-network
    restart: unless-stopped
    profiles:
      - alerting

# ==========================================================================
# Networks
# ==========================================================================
networks:
  monitoring-network:
    driver: bridge

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
