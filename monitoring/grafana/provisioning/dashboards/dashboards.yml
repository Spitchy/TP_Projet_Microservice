# Grafana Dashboard Provisioning
# Automatically load dashboards from the specified folder

apiVersion: 1

providers:
  - name: 'Library API Dashboards'
    orgId: 1
    folder: 'Library Management'
    folderUid: 'library-management'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
