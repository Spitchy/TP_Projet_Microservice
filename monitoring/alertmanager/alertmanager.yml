# Alertmanager Configuration
# Phase 6 - Monitoring & Performance

global:
  # How long to wait before sending a notification again if already sent
  resolve_timeout: 5m

# Route tree for alerts
route:
  # Default receiver
  receiver: 'default-receiver'
  
  # Group by alertname to avoid sending too many notifications
  group_by: ['alertname', 'severity']
  
  # How long to wait to buffer alerts before sending
  group_wait: 30s
  
  # How long to wait before sending a notification about new alerts in a group
  group_interval: 5m
  
  # How long to wait before resending a notification
  repeat_interval: 4h
  
  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
    
    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 4h

# Receivers define notification integrations
receivers:
  # Default receiver - logs only (for development)
  - name: 'default-receiver'
    # webhook_configs:
    #   - url: 'http://localhost:5001/webhook'

  # Critical alerts receiver
  - name: 'critical-receiver'
    # In production, configure email/slack/pagerduty:
    # email_configs:
    #   - to: 'team@example.com'
    #     from: 'alertmanager@example.com'
    #     smarthost: 'smtp.gmail.com:587'
    #     auth_username: 'alertmanager@example.com'
    #     auth_password: 'password'
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/XXX'
    #     channel: '#alerts-critical'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  # Warning alerts receiver  
  - name: 'warning-receiver'
    # Same configuration as above but for warnings

# Inhibition rules - suppress certain alerts when others are firing
inhibit_rules:
  # If service is down, suppress high latency alerts
  - source_match:
      alertname: 'LibraryApiDown'
    target_match:
      alertname: 'HighLatency'
    equal: ['service']
  
  # If service is down, suppress high error rate alerts
  - source_match:
      alertname: 'LibraryApiDown'
    target_match:
      alertname: 'HighErrorRate'
    equal: ['service']
