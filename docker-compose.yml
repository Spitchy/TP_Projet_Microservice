version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: library_postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libraryuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarypassword}
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-libraryuser} -d ${POSTGRES_DB:-library_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      POSTGRES_USER: ${POSTGRES_USER:-libraryuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarypassword}
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  library-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
