apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: library-system

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - rbac.yaml
  - pvc.yaml
  - postgres.yaml
  - app-deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

replicas:
  - name: library-service
    count: 2

images:
  - name: ghcr.io/spitchy/tp_projet_microservice
    newTag: latest
