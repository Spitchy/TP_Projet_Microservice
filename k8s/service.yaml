apiVersion: v1
kind: Service
metadata:
  name: library-service
  namespace: library-system
  labels:
    app: library-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: library-app

---
apiVersion: v1
kind: Service
metadata:
  name: library-service-lb
  namespace: library-system
  labels:
    app: library-app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  - port: 443
    targetPort: 3001
    protocol: TCP
    name: https
  selector:
    app: library-app
