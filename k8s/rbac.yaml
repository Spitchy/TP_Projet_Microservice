apiVersion: v1
kind: ServiceAccount
metadata:
  name: library-app
  namespace: library-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: library-app-role
  namespace: library-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: library-app-rolebinding
  namespace: library-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: library-app-role
subjects:
- kind: ServiceAccount
  name: library-app
  namespace: library-system
