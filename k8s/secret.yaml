apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: library-system
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "password"
  DATABASE_URL: "postgresql://postgres:password@postgres.library-system.svc.cluster.local:5432/library"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: library-system
type: Opaque
stringData:
  JWT_SECRET: "your-secret-key-change-this-in-production"

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificate
  namespace: library-system
type: tls
stringData:
  tls.crt: "-----BEGIN CERTIFICATE-----\nMIIC...\n-----END CERTIFICATE-----"
  tls.key: "-----BEGIN PRIVATE KEY-----\nMIIE...\n-----END PRIVATE KEY-----"
