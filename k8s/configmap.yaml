apiVersion: v1
kind: ConfigMap
metadata:
  name: library-config
  namespace: library-system
data:
  NODE_ENV: "production"
  PORT: "3001"
  POSTGRES_HOST: "postgres.library-system.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "library"
  LOG_LEVEL: "info"
  API_BASE_URL: "http://localhost:3001"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: library-system
data:
  INITDB_ARGS: "-c max_connections=200"
  PGDATA: "/var/lib/postgresql/data/pgdata"
